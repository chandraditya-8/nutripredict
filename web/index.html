<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Diet Recommendation</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
<h1>Smart Diet Recommendation System</h1>

<form method="POST">
<input type="number" name="age" placeholder="Age" required>

<select name="gender">
<option value="0">Male</option>
<option value="1">Female</option>
</select>

<input type="number" step="0.1" name="weight" placeholder="Weight (kg)" required>
<input type="number" step="0.1" name="height" placeholder="Height (cm)" required>

<select name="activity">
<option value="0">Sedentary</option>
<option value="1">Moderate</option>
<option value="2">Active</option>
</select>

<select name="goal">
<option value="0">Lose Weight</option>
<option value="1">Maintain Weight</option>
<option value="2">Gain Weight</option>
</select>

<button type="submit">Predict</button>
</form>

{% if result %}
<div class="card">
<h2>Results</h2>
<p>BMI: {{ bmi }}</p>
<p>Calories: {{ result.calories }}</p>
<p>Protein: {{ result.protein }} g</p>
<p>Carbs: {{ result.carbs }} g</p>
<p>Fat: {{ result.fat }} g</p>
</div>
{% endif %}
</div>
</body>
</html>
